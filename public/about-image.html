<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>About — Hybrid, remote, international</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: oklch(0.975 0.008 70);
    --ink: oklch(0.22 0.015 60);
    --ink-soft: oklch(0.45 0.012 60);
    --ink-faint: oklch(0.78 0.010 60);
    --land: oklch(0.55 0.012 60);
    --rule: oklch(0.85 0.010 60);
    --accent: oklch(0.62 0.15 45);
    --home: oklch(0.55 0.17 40);
  }

  html, body { margin: 0; padding: 0; background: oklch(0.94 0.006 70); font-family: 'Newsreader', Georgia, serif; color: var(--ink); }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; box-sizing: border-box; }

  .frame {
    width: 1200px;
    max-width: 100%;
    aspect-ratio: 16 / 10;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    box-shadow: 0 1px 0 oklch(0.88 0.01 70), 0 30px 60px -30px oklch(0.3 0.02 60 / 0.25);
  }

  .map-svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .eyebrow {
    position: absolute;
    top: 36px;
    left: 44px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    text-transform: uppercase;
    z-index: 5;
    white-space: nowrap;
  }
  .eyebrow .dot { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-right: 8px; vertical-align: middle; transform: translateY(-1px); }

  .stats {
    position: absolute;
    top: 36px;
    right: 44px;
    display: flex;
    gap: 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    text-transform: uppercase;
    z-index: 5;
  }
  .stats .n { display: block; font-family: 'Newsreader', serif; font-size: 22px; font-style: italic; color: var(--ink); letter-spacing: 0; margin-bottom: 2px; }

  /* SVG label styles */
  .city-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; fill: var(--ink); text-transform: uppercase; font-weight: 500; }
  .home-label { font-family: 'Newsreader', serif; font-style: italic; font-size: 22px; fill: var(--home); }
  .home-sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.22em; fill: var(--ink-soft); text-transform: uppercase; }

  .arc { fill: none; stroke: var(--accent); stroke-width: 0.7; opacity: 0.5; stroke-linecap: round; }
  .arc-back { fill: none; stroke: oklch(0.7 0.02 60); stroke-width: 0.4; opacity: 0.4; stroke-dasharray: 2 3; }

  .crosshair { stroke: var(--home); stroke-width: 0.6; opacity: 0.5; }

  /* corner registration */
  .reg {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
    text-transform: uppercase;
    z-index: 5;
  }
  .reg.bl { left: 44px; bottom: 30px; }
  .reg.br { right: 44px; bottom: 30px; text-align: right; }
</style>
</head>
<body>

<div class="frame" aria-label="World map of hybrid, international collaboration">

  <!-- HUD overlays -->
  <div class="eyebrow"><span class="dot"></span>Hybrid · Remote-first · Cross-cultural</div>
  <div class="stats">
    <div><span class="n">3</span>continents</div>
    <div><span class="n">9</span>countries</div>
    <div><span class="n">13</span>cities</div>
    <div><span class="n">8</span>time zones</div>
  </div>

  <div class="reg bl">Fig. 01 — Working map · Equirectangular</div>
  <div class="reg br">Helsinki 60.17°N · 24.94°E</div>

  <!-- Map SVG: equirectangular projection.
       Coordinate system: longitude -180..180 -> x 0..1000; latitude 85..-60 -> y 0..600 -->
  <svg class="map-svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet">

    <!-- Faint graticule -->
    <g stroke="oklch(0.88 0.01 60)" stroke-width="0.4" fill="none">
      <!-- meridians every 30° -->
      <line x1="200" y1="120" x2="200" y2="640"/>
      <line x1="333" y1="120" x2="333" y2="640"/>
      <line x1="467" y1="120" x2="467" y2="640"/>
      <line x1="600" y1="120" x2="600" y2="640" stroke="oklch(0.82 0.01 60)" stroke-width="0.5"/>
      <line x1="733" y1="120" x2="733" y2="640"/>
      <line x1="867" y1="120" x2="867" y2="640"/>
      <line x1="1000" y1="120" x2="1000" y2="640"/>
      <!-- parallels every 30° -->
      <line x1="100" y1="220" x2="1100" y2="220"/>
      <line x1="100" y1="380" x2="1100" y2="380" stroke="oklch(0.82 0.01 60)" stroke-width="0.5"/>
      <line x1="100" y1="540" x2="1100" y2="540"/>
    </g>

    <!-- Dot-grid world map. Computed in script below and injected into #dotmap -->
    <g id="dotmap" fill="var(--land)"></g>

    <!-- Connection arcs (drawn in JS, target visited cities from Helsinki) -->
    <g id="arcs"></g>

    <!-- City markers and labels (drawn in JS) -->
    <g id="cities"></g>

  </svg>

</div>

<script>
/*
  Equirectangular projection helpers.
  We use viewBox 1200 x 750.
  We map lon -180..180 -> x 100..1100 (1000px wide, centered)
       lat  85..-60 -> y 120..640 (520px tall)
  So 1° lon = 1000/360 ≈ 2.778 px ; 1° lat = 520/145 ≈ 3.586 px
*/
const X0 = 100, X1 = 1100;
const Y0 = 120, Y1 = 640;
const LAT_TOP = 85, LAT_BOT = -60;
function project(lon, lat) {
  const x = X0 + ((lon + 180) / 360) * (X1 - X0);
  const y = Y0 + ((LAT_TOP - lat) / (LAT_TOP - LAT_BOT)) * (Y1 - Y0);
  return [x, y];
}

/* ---------- Continent silhouettes as polygon arrays ----------
   Hand-curated approximate outlines in [lon, lat] pairs, designed
   for a clean editorial look. Not survey-grade but recognizable. */

const continents = [
  // North America (mainland + roughly Alaska)
  [
    [-168,66],[-156,71],[-140,70],[-128,69],[-115,69],[-102,68],[-95,72],[-82,73],[-75,68],[-65,60],
    [-55,52],[-60,46],[-67,44],[-71,41],[-74,39],[-77,35],[-81,30],[-83,25],[-80,25],[-82,27],
    [-89,29],[-95,29],[-97,26],[-105,22],[-110,23],[-114,30],[-117,33],[-122,37],[-124,42],
    [-124,48],[-130,54],[-135,58],[-145,60],[-153,58],[-160,57],[-166,60],[-168,66]
  ],
  // Greenland
  [
    [-55,82],[-30,83],[-22,81],[-22,73],[-30,68],[-42,60],[-50,62],[-55,68],[-60,75],[-60,80],[-55,82]
  ],
  // South America
  [
    [-77,8],[-72,11],[-62,11],[-55,5],[-50,0],[-44,-2],[-39,-6],[-35,-9],[-38,-15],[-41,-22],
    [-48,-26],[-58,-34],[-62,-39],[-66,-45],[-70,-52],[-72,-54],[-74,-52],[-73,-46],[-72,-40],
    [-72,-33],[-71,-25],[-71,-18],[-75,-14],[-79,-8],[-81,-4],[-80,0],[-78,3],[-77,8]
  ],
  // Africa
  [
    [-17,21],[-12,28],[-5,32],[5,35],[10,33],[20,32],[28,32],[32,30],[34,28],[36,22],[38,18],
    [42,16],[44,12],[48,12],[51,10],[51,4],[46,-1],[40,-7],[40,-15],[38,-22],[33,-28],[26,-33],
    [20,-34],[18,-31],[15,-25],[12,-17],[10,-3],[6,4],[1,5],[-7,5],[-15,11],[-17,15],[-17,21]
  ],
  // Europe (mainland + UK + Scandinavia)
  [
    [-9,38],[-9,43],[-5,44],[-2,48],[-5,50],[-2,52],[3,53],[7,54],[8,57],[5,58],[5,62],[10,64],
    [15,68],[20,70],[27,71],[30,69],[33,67],[31,62],[28,60],[28,57],[24,56],[22,54],[18,55],
    [14,54],[12,55],[10,54],[12,49],[15,46],[19,45],[23,46],[27,45],[30,46],[33,45],[36,45],
    [38,43],[35,40],[28,41],[24,40],[20,40],[16,41],[12,38],[8,40],[3,42],[0,40],[-5,37],[-9,38]
  ],
  // UK / Ireland (separate small island)
  [
    [-10,55],[-8,58],[-3,59],[-1,55],[-2,51],[-5,50],[-10,52],[-10,55]
  ],
  // Asia (large chunk)
  [
    [33,67],[40,68],[55,71],[70,73],[85,73],[100,76],[115,77],[130,73],[145,70],[155,66],[165,65],
    [175,69],[180,68],[180,60],[170,55],[155,52],[145,55],[140,46],[130,42],[126,38],[129,34],
    [122,30],[110,21],[107,15],[103,10],[100,6],[103,1],[110,1],[105,-7],[112,-8],[120,-5],
    [130,-2],[120,5],[115,10],[112,15],[105,20],[97,16],[95,22],[88,22],[82,22],[78,8],[73,15],
    [70,22],[68,24],[60,25],[55,28],[48,30],[44,38],[42,42],[40,42],[36,40],[35,45],[40,50],
    [42,55],[45,60],[40,64],[35,65],[33,67]
  ],
  // India peninsula (extension to Asia, but standalone helps clarity)
  [
    [68,24],[72,22],[73,16],[76,10],[78,8],[80,12],[82,18],[85,21],[87,22],[78,28],[68,24]
  ],
  // Indonesia / Java / Sumatra (rough)
  [
    [95,5],[100,0],[105,-5],[112,-7],[118,-8],[125,-9],[130,-7],[128,-2],[122,0],[115,3],[108,5],[100,3],[95,5]
  ],
  // Japan
  [
    [130,33],[135,35],[140,40],[143,43],[141,38],[137,35],[132,33],[130,33]
  ],
  // Australia
  [
    [114,-22],[115,-26],[116,-32],[120,-34],[126,-32],[132,-32],[137,-35],[140,-38],[146,-39],[150,-38],
    [153,-34],[153,-28],[151,-24],[146,-19],[142,-11],[136,-12],[131,-12],[126,-14],[120,-17],[116,-20],[114,-22]
  ],
  // New Zealand (two islands simplified)
  [
    [173,-35],[177,-37],[176,-41],[172,-44],[168,-46],[166,-44],[170,-39],[173,-35]
  ],
  // Madagascar
  [
    [44,-12],[48,-15],[50,-22],[47,-25],[44,-23],[43,-18],[44,-12]
  ],
  // Iceland
  [
    [-23,64],[-19,66],[-14,66],[-13,64],[-17,63],[-22,63],[-23,64]
  ],
];

/* Build a single Path2D path from continents (in projected SVG coords) */
function buildContinentPath() {
  const ctx = document.createElement('canvas').getContext('2d');
  const path = new Path2D();
  for (const poly of continents) {
    poly.forEach(([lon, lat], i) => {
      const [x, y] = project(lon, lat);
      if (i === 0) path.moveTo(x, y);
      else path.lineTo(x, y);
    });
    path.closePath();
  }
  return path;
}

/* Generate a dot grid clipped to continents.
   We test each grid point against the continent path using an offscreen canvas. */
function generateDotGrid(spacing = 8) {
  const canvas = document.createElement('canvas');
  canvas.width = 1200;
  canvas.height = 750;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  // build path once
  const path = new Path2D();
  for (const poly of continents) {
    poly.forEach(([lon, lat], i) => {
      const [x, y] = project(lon, lat);
      if (i === 0) path.moveTo(x, y);
      else path.lineTo(x, y);
    });
    path.closePath();
  }
  ctx.fill(path);

  // sample
  const dots = [];
  const img = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  for (let y = Y0 - 10; y < Y1 + 10; y += spacing) {
    const offset = (y % (spacing * 2) === 0) ? 0 : spacing / 2; // hex-ish offset
    for (let x = X0 - 10; x < X1 + 10; x += spacing) {
      const px = Math.round(x + offset);
      const py = Math.round(y);
      if (px < 0 || py < 0 || px >= canvas.width || py >= canvas.height) continue;
      const idx = (py * canvas.width + px) * 4 + 3; // alpha
      if (img[idx] > 128) dots.push([px, py]);
    }
  }
  return dots;
}

const dots = generateDotGrid(6);
const dotG = document.getElementById('dotmap');
const NS = 'http://www.w3.org/2000/svg';
for (const [x, y] of dots) {
  const c = document.createElementNS(NS, 'circle');
  c.setAttribute('cx', x);
  c.setAttribute('cy', y);
  c.setAttribute('r', 1.4);
  c.setAttribute('fill', 'oklch(0.55 0.012 60)');
  dotG.appendChild(c);
}

/* ---------- Cities ---------- */
const HOME = { name: 'Helsinki', lon: 24.94, lat: 60.17, home: true };
const cities = [
  // North America
  { name: 'Toronto',     lon: -79.38,  lat: 43.65,  side: 'left'  },
  { name: 'Boston',      lon: -71.06,  lat: 42.36,  side: 'right' },
  { name: 'California',  lon: -122.27, lat: 37.80,  side: 'left'  },
  { name: 'Austin',      lon: -97.74,  lat: 30.27,  side: 'left'  },
  { name: 'Richmond',    lon: -77.43,  lat: 37.54,  side: 'right' },
  { name: 'Atlanta',     lon: -84.39,  lat: 33.75,  side: 'left'  },
  // Europe
  { name: 'Sollentuna',  lon: 17.95,   lat: 59.43,  side: 'left',  dx: -14, dy: -16 },
  { name: 'Turku',       lon: 22.27,   lat: 60.45,  side: 'left',  dx: -16, dy: 22 },
  { name: 'Switzerland', lon: 8.23,    lat: 46.82,  side: 'left',  dx: -12, dy: -6 },
  { name: 'Turin',       lon: 7.69,    lat: 45.07,  side: 'right', dx: 12,  dy: 18 },
  // Asia
  { name: 'India',       lon: 77.59,   lat: 12.97,  side: 'right' },  // Bangalore-ish
  { name: 'China',       lon: 121.47,  lat: 31.23,  side: 'right' },  // Shanghai
  { name: 'Singapore',   lon: 103.82,  lat: 1.35,   side: 'right' },
];

/* Draw arcs from Helsinki to each city.
   We use a quadratic curve whose control point is offset perpendicular to the chord,
   biased upward (north) to suggest great-circle paths over the pole. */
const arcG = document.getElementById('arcs');
const [hx, hy] = project(HOME.lon, HOME.lat);

for (const c of cities) {
  const [cx, cy] = project(c.lon, c.lat);
  const mx = (hx + cx) / 2;
  const my = (hy + cy) / 2;
  // perpendicular vector
  const dx = cx - hx, dy = cy - hy;
  const len = Math.hypot(dx, dy) || 1;
  // bow upward for long-distance, less for short
  const bow = Math.min(120, len * 0.18);
  // Always bow toward top of map (north) to feel like great-circle
  const ctrlX = mx + (-dy / len) * bow * Math.sign((-dy / len) || 1);
  let ctrlY = my + (dx / len) * bow;
  // ensure control point is above midpoint (smaller y)
  if (ctrlY > my) ctrlY = my - bow;

  const path = document.createElementNS(NS, 'path');
  path.setAttribute('d', `M ${hx} ${hy} Q ${mx} ${ctrlY} ${cx} ${cy}`);
  path.setAttribute('class', 'arc');
  arcG.appendChild(path);
}

/* Draw city dots + labels */
const cityG = document.getElementById('cities');

for (const c of cities) {
  const [cx, cy] = project(c.lon, c.lat);

  // outer ring
  const ring = document.createElementNS(NS, 'circle');
  ring.setAttribute('cx', cx); ring.setAttribute('cy', cy);
  ring.setAttribute('r', 5);
  ring.setAttribute('fill', 'none');
  ring.setAttribute('stroke', 'oklch(0.62 0.15 45)');
  ring.setAttribute('stroke-width', '0.8');
  ring.setAttribute('opacity', '0.55');
  cityG.appendChild(ring);

  // dot
  const dot = document.createElementNS(NS, 'circle');
  dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
  dot.setAttribute('r', 2.4);
  dot.setAttribute('fill', 'oklch(0.22 0.015 60)');
  cityG.appendChild(dot);

  // label
  const label = document.createElementNS(NS, 'text');
  label.setAttribute('class', 'city-label');
  const dx = (c.dx !== undefined) ? c.dx : (c.side === 'left' ? -10 : 10);
  const dy = (c.dy !== undefined) ? c.dy : 3;
  label.setAttribute('x', cx + dx);
  label.setAttribute('y', cy + dy);
  label.setAttribute('text-anchor', c.side === 'left' ? 'end' : 'start');
  label.textContent = c.name;
  cityG.appendChild(label);

  // tiny connector line for offset labels
  if (c.dy !== undefined && Math.abs(c.dy) > 6) {
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', cx); line.setAttribute('y1', cy);
    line.setAttribute('x2', cx + dx + (c.side === 'left' ? 2 : -2));
    line.setAttribute('y2', cy + dy - 3);
    line.setAttribute('stroke', 'oklch(0.7 0.02 60)');
    line.setAttribute('stroke-width', '0.5');
    cityG.appendChild(line);
  }
}

/* HOME marker (Helsinki) */
const home = document.createElementNS(NS, 'g');

// crosshair
const ch1 = document.createElementNS(NS, 'line');
ch1.setAttribute('x1', hx); ch1.setAttribute('y1', hy - 22);
ch1.setAttribute('x2', hx); ch1.setAttribute('y2', hy + 22);
ch1.setAttribute('class', 'crosshair');
home.appendChild(ch1);
const ch2 = document.createElementNS(NS, 'line');
ch2.setAttribute('x1', hx - 22); ch2.setAttribute('y1', hy);
ch2.setAttribute('x2', hx + 22); ch2.setAttribute('y2', hy);
ch2.setAttribute('class', 'crosshair');
home.appendChild(ch2);

// concentric pulse rings
[18, 12, 7].forEach((r, i) => {
  const ring = document.createElementNS(NS, 'circle');
  ring.setAttribute('cx', hx); ring.setAttribute('cy', hy);
  ring.setAttribute('r', r);
  ring.setAttribute('fill', 'none');
  ring.setAttribute('stroke', 'oklch(0.55 0.17 40)');
  ring.setAttribute('stroke-width', '0.8');
  ring.setAttribute('opacity', String(0.25 + i * 0.18));
  home.appendChild(ring);
});

// solid dot
const hd = document.createElementNS(NS, 'circle');
hd.setAttribute('cx', hx); hd.setAttribute('cy', hy);
hd.setAttribute('r', 4);
hd.setAttribute('fill', 'oklch(0.55 0.17 40)');
home.appendChild(hd);

// label — placed up and to the right of Helsinki to clear nearby labels
const hlabel = document.createElementNS(NS, 'text');
hlabel.setAttribute('class', 'home-label');
hlabel.setAttribute('x', hx + 32);
hlabel.setAttribute('y', hy - 4);
hlabel.textContent = 'Helsinki';
home.appendChild(hlabel);

const hsub = document.createElementNS(NS, 'text');
hsub.setAttribute('class', 'home-sub');
hsub.setAttribute('x', hx + 32);
hsub.setAttribute('y', hy + 12);
hsub.textContent = '— home base';
home.appendChild(hsub);

document.getElementById('cities').appendChild(home);

</script>

</body>
</html>
